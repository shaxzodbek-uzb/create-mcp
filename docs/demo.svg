<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 430" width="780" height="430" font-family="ui-monospace, SFMono-Regular, 'SF Mono', Menlo, Consolas, monospace" role="img" aria-label="create-mcp terminal demo">
  <style>
    .line { opacity: 1; }
    .t  { font-size: 15px; }
    .dim{ fill: #8b949e; }
    .fg { fill: #c9d1d9; }
    .pr { fill: #58a6ff; }
    .ok { fill: #3fb950; }
    .pk { fill: #d2a8ff; }
    /* Each line reveals in sequence, holds, then the whole cycle loops.
       If a renderer ignores CSS animation, all lines stay visible (base opacity:1). */
    .a1 { animation: l1 13s infinite linear; }
    .a2 { animation: l2 13s infinite linear; }
    .a3 { animation: l3 13s infinite linear; }
    .a4 { animation: l4 13s infinite linear; }
    .a5 { animation: l5 13s infinite linear; }
    .a6 { animation: l6 13s infinite linear; }
    .a7 { animation: l7 13s infinite linear; }
    .a8 { animation: l8 13s infinite linear; }
    .a9 { animation: l9 13s infinite linear; }
    .a10{ animation: l10 13s infinite linear; }
    .a11{ animation: l11 13s infinite linear; }
    .cur{ animation: blink 1.1s steps(1) infinite; }
    @keyframes l1 {0%,2%{opacity:0} 3%,92%{opacity:1} 97%,100%{opacity:0}}
    @keyframes l2 {0%,11%{opacity:0} 12%,92%{opacity:1} 97%,100%{opacity:0}}
    @keyframes l3 {0%,15%{opacity:0} 16%,92%{opacity:1} 97%,100%{opacity:0}}
    @keyframes l4 {0%,19%{opacity:0} 20%,92%{opacity:1} 97%,100%{opacity:0}}
    @keyframes l5 {0%,24%{opacity:0} 25%,92%{opacity:1} 97%,100%{opacity:0}}
    @keyframes l6 {0%,27%{opacity:0} 28%,92%{opacity:1} 97%,100%{opacity:0}}
    @keyframes l7 {0%,30%{opacity:0} 31%,92%{opacity:1} 97%,100%{opacity:0}}
    @keyframes l8 {0%,33%{opacity:0} 34%,92%{opacity:1} 97%,100%{opacity:0}}
    @keyframes l9 {0%,41%{opacity:0} 42%,92%{opacity:1} 97%,100%{opacity:0}}
    @keyframes l10{0%,46%{opacity:0} 47%,92%{opacity:1} 97%,100%{opacity:0}}
    @keyframes l11{0%,51%{opacity:0} 52%,92%{opacity:1} 97%,100%{opacity:0}}
    @keyframes blink {0%,50%{opacity:1} 51%,100%{opacity:0}}
  </style>

  <!-- window -->
  <rect x="0" y="0" width="780" height="430" rx="12" fill="#0d1117"/>
  <rect x="0" y="0" width="780" height="40" rx="12" fill="#161b22"/>
  <rect x="0" y="28" width="780" height="12" fill="#161b22"/>
  <circle cx="24" cy="20" r="6" fill="#ff5f56"/>
  <circle cx="46" cy="20" r="6" fill="#ffbd2e"/>
  <circle cx="68" cy="20" r="6" fill="#27c93f"/>
  <text x="390" y="25" text-anchor="middle" class="t dim" font-size="13">create-mcp</text>

  <!-- command -->
  <text x="28" y="74" class="line t a1"><tspan class="pr">$</tspan><tspan class="fg" xml:space="preserve"> uvx </tspan><tspan class="ok">create-mcp</tspan><tspan class="fg" xml:space="preserve"> pay-tools --preset api-wrapper --auth oauth --yes</tspan></text>

  <!-- result lines -->
  <text x="28" y="106" class="line t a2"><tspan class="ok">✓</tspan><tspan class="fg" xml:space="preserve"> Scaffolded </tspan><tspan class="pk">pay-tools</tspan><tspan class="dim" xml:space="preserve">  (API wrapper · streamable-http · auth: oauth)</tspan></text>
  <text x="28" y="130" class="line t a3"><tspan class="ok" xml:space="preserve">  ✓</tspan><tspan class="dim" xml:space="preserve"> initialised git repository</tspan></text>
  <text x="28" y="154" class="line t a4"><tspan class="ok" xml:space="preserve">  ✓</tspan><tspan class="dim" xml:space="preserve"> installed dependencies (uv sync)</tspan></text>

  <!-- next steps panel -->
  <g class="line a5">
    <rect x="28" y="176" width="724" height="104" rx="8" fill="none" stroke="#2ea043" stroke-opacity="0.5"/>
    <rect x="44" y="168" width="104" height="16" fill="#0d1117"/>
    <text x="52" y="181" class="t ok" font-size="12" letter-spacing="1">NEXT STEPS</text>
  </g>
  <text x="48" y="212" class="line t a6"><tspan class="fg">cd pay-tools</tspan></text>
  <text x="48" y="240" class="line t a7"><tspan class="pr">uv run</tspan><tspan class="fg"> pay_tools</tspan><tspan class="dim" xml:space="preserve">     # start the server</tspan></text>
  <text x="48" y="268" class="line t a8"><tspan class="pr">uv run</tspan><tspan class="fg"> pytest</tspan><tspan class="dim" xml:space="preserve">        # green ✓</tspan></text>

  <!-- run tests -->
  <text x="28" y="306" class="line t a9"><tspan class="pr">$</tspan><tspan class="fg" xml:space="preserve"> uv run pytest</tspan></text>
  <text x="28" y="330" class="line t a10"><tspan class="ok">........</tspan><tspan class="dim" xml:space="preserve">                                  [100%]</tspan></text>
  <text x="28" y="356" class="line t a11"><tspan class="ok" xml:space="preserve">8 passed</tspan><tspan class="dim" xml:space="preserve"> in 0.16s</tspan></text>

  <!-- prompt + blinking cursor -->
  <text x="28" y="392" class="t"><tspan class="pr">$</tspan><tspan class="fg cur" dx="8">▋</tspan></text>
</svg>
