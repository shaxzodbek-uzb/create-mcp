name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  unit:
    name: scaffolder unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - run: uv sync --dev
      - run: uv run ruff check .
      - run: uv run ruff format --check .
      - run: uv run mypy src
      - run: uv run pytest

  generated:
    name: generated project (${{ matrix.preset }} / ${{ matrix.auth }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        preset: [minimal, api-wrapper, db, agent-tools]
        auth: [none, oauth]
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install create-mcp
        run: uv sync

      - name: Scaffold a project
        run: >
          uv run create-mcp demo
          --preset ${{ matrix.preset }}
          --auth ${{ matrix.auth }}
          --yes --no-git --no-install
          -o /tmp/out

      - name: Verify the generated project
        working-directory: /tmp/out/demo
        run: |
          uv sync
          uv run ruff check .
          uv run ruff format --check .
          uv run mypy src
          uv run pytest
